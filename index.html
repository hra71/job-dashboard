<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobTrack Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">

  <!-- Header -->
  <h1 class="text-3xl font-bold mb-6">JobTrack Dashboard</h1>

  <!-- Dashboard Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow text-center">
      <h2 class="text-lg font-semibold">Total Jobs</h2>
      <p id="totalCount" class="text-2xl font-bold">0</p>
    </div>

    <div class="bg-white p-4 rounded shadow text-center">
      <h2 class="text-lg font-semibold">Interview</h2>
      <p id="interviewCount" class="text-2xl font-bold text-green-600">0</p>
    </div>

    <div class="bg-white p-4 rounded shadow text-center">
      <h2 class="text-lg font-semibold">Rejected</h2>
      <p id="rejectedCount" class="text-2xl font-bold text-red-600">0</p>
    </div>
  </div>

  <!-- Available Jobs Header -->
  <div class="flex justify-between items-center mb-2">
    <h2 class="text-2xl font-semibold">Available Jobs</h2>
    <span id="tabCount" class="font-bold">8</span>
  </div>

  <!-- Tabs -->
  <div class="flex gap-2 mb-4">
    <button class="tabBtn bg-blue-500 text-white px-4 py-2 rounded" data-tab="All">All</button>
    <button class="tabBtn bg-gray-300 px-4 py-2 rounded" data-tab="Interview">Interview</button>
    <button class="tabBtn bg-gray-300 px-4 py-2 rounded" data-tab="Rejected">Rejected</button>
  </div>

  <!-- Jobs Container -->
  <div id="jobsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <!-- Empty State -->
  <div id="emptyState" class="hidden text-center mt-10">
    <div class="text-6xl">📭</div>
    <h3 class="text-xl font-semibold mt-2">No Jobs Available</h3>
    <p class="text-gray-500">You haven’t selected any job yet.</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
