<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { background-color: #4f46e5 !important; color: white !important; }
        .tab-active span { background-color: #3730a3 !important; color: white !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white p-4 border-b flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2">
        <div class="bg-black p-2 rounded-full">
            <div class="w-4 h-4 bg-white rounded-sm"></div>
        </div>
        <h1 class="text-xl font-bold text-gray-800">GitHub Issues Tracker</h1>
    </div>
    
    <div class="flex items-center gap-2 flex-1 max-w-lg px-8">
        <div class="relative w-full">
            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">🔍</span>
            <input type="text" id="searchInput" placeholder="Search issues..." 
                   class="w-full bg-gray-100 border-none rounded-lg pl-10 pr-4 py-2 focus:ring-2 focus:ring-indigo-500">
        </div>
        <button class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700">Search</button>
    </div>

    <div class="flex gap-3">
        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg flex items-center gap-2">
            + New Issue
        </button>
        <a href="index.html" class="border px-4 py-2 rounded-lg hover:bg-gray-100 text-gray-700 transition-colors font-medium">
            Sign out
        </a>
    </div>
</header>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="bg-white p-4 rounded-xl shadow-sm border mb-8 flex gap-4">
            <button data-status="all" class="tab tab-active px-6 py-2 rounded-lg border flex items-center gap-2 transition-all">
                All <span class="bg-gray-200 px-2 rounded-full text-xs text-gray-600" id="countAll">0</span>
            </button>
            <button data-status="open" class="tab px-6 py-2 rounded-lg border flex items-center gap-2 transition-all">
                Open <span class="bg-gray-200 px-2 rounded-full text-xs text-gray-600" id="countOpen">0</span>
            </button>
            <button data-status="closed" class="tab px-6 py-2 rounded-lg border flex items-center gap-2 transition-all">
                Closed <span class="bg-gray-200 px-2 rounded-full text-xs text-gray-600" id="countClosed">0</span>
            </button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border mb-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center font-bold">
                    <span id="headerIconCount">0</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold"><span id="headerStatusText">All</span> Issues</h2>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6">
                <div class="flex items-center gap-2 text-sm font-medium"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</div>
                <div class="flex items-center gap-2 text-sm font-medium"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</div>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg shadow-2xl animate-in fade-in zoom-in duration-200">
            <h2 id="modalTitle" class="text-2xl font-bold mb-2 text-gray-900"></h2>
            <div class="text-sm text-gray-500 mb-6 flex items-center gap-2">
                <span id="modalStatusBadge" class="px-2 py-0.5 rounded text-[10px] font-bold uppercase"></span> 
                <span>• Opened by <span id="modalAuthor" class="font-semibold text-gray-700"></span></span>
                <span>• <span id="modalDate"></span></span>
            </div>
            <div id="modalLabels" class="flex flex-wrap gap-2 mb-6"></div>
            <div class="bg-gray-50 p-4 rounded-xl mb-6">
                <p id="modalDesc" class="text-gray-700 leading-relaxed"></p>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div><p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Assignee</p><p id="modalAssignee" class="text-gray-900 font-medium"></p></div>
                <div><p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Priority</p><div id="modalPriority" class="inline-block px-2 py-1 rounded text-[10px] font-bold uppercase mt-1"></div></div>
            </div>
            <button id="closeModal" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-black transition-colors">Back to Dashboard</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
